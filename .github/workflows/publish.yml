name: "Publish workflow"

on:
  push:
    tags:
      - '*'

jobs:
  publish:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v3
        with:
          node-version: '22'
          cache: 'yarn'
          registry-url: 'https://registry.npmjs.org'
          scope: '@material-rn'
      - name: Install modules
        run: yarn install --immutable
      - name: Build
        run: yarn build
      - name: Publish to npm
        run: |
          yarn config set npmScopes.material-rn.npmAuthToken $NPM_TOKEN
          yarn lerna exec --no-private -- yarn npm publish
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
